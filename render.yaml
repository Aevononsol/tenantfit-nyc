services:
  - type: web
    name: tenantfit-nyc
    runtime: node
    plan: pro
    buildCommand: npm install
    startCommand: npm start
    # Persistent disk so signal-cache.json (locked scoring signals + competitor
    # snapshots) survives deploys and restarts — required for deterministic
    # scores. Without it the cache lives on the ephemeral filesystem and every
    # deploy re-rolls the live signals.
    disk:
      name: spotvest-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: SPOTVEST_DATA_DIR
        value: /var/data
      - key: NODE_ENV
        value: production
      - key: CENSUS_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: NYC_OPEN_DATA_APP_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
